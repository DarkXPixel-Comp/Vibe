syntax = "proto3";

package message;

option go_package = "github.com/DarkXPixel/Vibe/proto/message";

service MessageService {
    rpc ListMessages(ListMessagesRequest) returns (ListMessageResponse);
    rpc GetDifference(GetDifferenceRequest) returns (GetDifferenceResponse);
    rpc DeleteMessage(DeleteMessageRequest) returns (DeleteMessageResponse);
    rpc GetState(GetStateRequest) returns (GetStateResponse);
}

message GetDifferenceRequest {
    string user_id = 1;
    int64 pts = 2;
}

message GetDifferenceResponse {
    int64 new_pts = 1;
    repeated ChatState states = 2;
}

message DeleteMessageRequest {
    string message_id = 1;
    string chat_id = 2;
}

message DeleteMessageResponse {
    bool success = 1;
}

message ListMessagesRequest {
    string chat_id = 1;
    int32 limit = 2;
    string last_message_id = 3;
}

message ListMessageResponse {
    repeated Message messages = 1;
    bool success = 2;
}

message GetStateRequest {
    string user_id = 1;
}

message GetStateResponse {
    int64 pts = 1;
}

message Message {
    string id = 1;
    string chat_id = 2;
    string user_id = 3;
    string type = 4; // text, call, audio, video, file
    string payload = 5; // JSON-encoded data
    string timestamp = 6;
}

message ChatState {
    string chat_id = 1;
    repeated Message messages = 3;
    repeated string deleted_message_ids = 4;
}

message CallEvent {
    string call_id = 1;
    string chat_id = 2;
    string initiator_id = 3;
    string event_type = 4;
    string timestamp = 5;
}