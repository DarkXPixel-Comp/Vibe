syntax = "proto3";

package common;

option go_package = "github.com/DarkXPixel/Vibe/proto/common";

message Message {
    string id = 1;
    string chat_id = 2;
    string user_id = 3;
    string type = 4;
    string payload = 5;
    string timestamp = 6;
}

message ChatState {
    string chat_id = 1;
    repeated Message messages = 2;
//    repeated string deleted_message_ids = 3;
}
message Update {
    string id = 1;
    string user_id = 2;
    string type = 3;
    string payload = 4;
    int64 pts = 5;
    int64 unordered_pts = 6;
    string timestamp = 7;
}

message ProfileState {
    string user_id = 1;
    string name = 2;
    string avatar_url = 3;
}